apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
      - name: catalog-api
        image: fcg-catalog-api:latest
        imagePullPolicy: Never 
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: fcg-config
        - secretRef:
            name: fcg-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
spec:
  type: LoadBalancer
  selector:
    app: catalog-api
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30003 # Você acessará via http://localhost:30003